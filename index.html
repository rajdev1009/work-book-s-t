<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AstraToonix 3D Knowledge Book</title>
    
    <!-- Correct CDN for StPageFlip -->
    <script src="https://cdn.jsdelivr.net/npm/page-flip/dist/js/page-flip.browser.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body class="sepia">

    <!-- Loader -->
    <div id="loader">
        <h1 class="loader-text">RAJ</h1>
    </div>

    <!-- Top Navigation -->
    <div class="top-nav">
        <input type="text" id="searchBar" placeholder="Search in book..." onkeyup="if(event.key === 'Enter') searchBook()">
        <div class="theme-switcher">
            <button onclick="toggleTheme('light')">☀️</button>
            <button onclick="toggleTheme('sepia')">📜</button>
            <button onclick="toggleTheme('dark')">🌙</button>
        </div>
    </div>

    <!-- Book Container -->
    <div class="wrapper">
        <div id="book-container"></div>
    </div>

    <!-- Bottom Controls -->
    <div class="bottom-nav">
        <div id="progressBar"><div id="progress"></div></div>
        <div class="controls">
            <button onclick="prevPage()"><i class="fas fa-chevron-left"></i></button>
            <button onclick="speakCurrentPage()"><i class="fas fa-volume-up"></i></button>
            <button onclick="toggleBookmark()"><i class="fas fa-bookmark"></i></button>
            <button onclick="nextPage()"><i class="fas fa-chevron-right"></i></button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
