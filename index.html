<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AstraToonix 3D Knowledge Book</title>
    
    <!-- External Libraries for 3D Flip & Particles -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/st-page-flip/2.0.3/js/page-flip.browser.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/tsparticles@2.12.0/tsparticles.bundle.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body class="sepia"> <!-- Default Theme -->

    <!-- RAJ Animation Loader -->
    <div id="loader"><h1>RAJ</h1></div>

    <!-- UI: Navigation & Search -->
    <div class="top-nav">
        <input type="text" id="searchBar" placeholder="Search chapters..." onkeyup="searchBook()">
        <div class="theme-switcher">
            <button onclick="toggleTheme('light')">☀️</button>
            <button onclick="toggleTheme('sepia')">📜</button>
            <button onclick="toggleTheme('dark')">🌙</button>
        </div>
    </div>

    <!-- 3D Book Container -->
    <div class="wrapper">
        <div id="book-container">
            <!-- Pages will be injected by script.js -->
        </div>
    </div>

    <!-- Progress & Controls -->
    <div class="bottom-nav">
        <div id="progressBar"><div id="progress"></div></div>
        <div class="controls">
            <button onclick="prevPage()"><i class="fas fa-chevron-left"></i></button>
            <button onclick="speakCurrentPage()"><i class="fas fa-volume-up"></i></button>
            <button onclick="toggleBookmark()"><i class="fas fa-bookmark"></i></button>
            <button onclick="nextPage()"><i class="fas fa-chevron-right"></i></button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
